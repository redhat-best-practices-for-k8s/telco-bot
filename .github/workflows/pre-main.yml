name: Run shfmt on scripts folder

on:
  pull_request:
    branches:
      - main
permissions: read-all
jobs:
  shfmt-check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Shfmt
        uses: mfinelli/setup-shfmt@a25fda4c1fe115aec0f85e04126610841bc3141d # v4.0.1

      - name: Run shfmt
        run: |
          shfmt -d scripts